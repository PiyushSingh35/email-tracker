<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailPulse Dashboard</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:48px 40px;text-align:center}
    .btn-google{padding:14px;background:#6366f1;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer}
    .app{display:none;min-height:100vh;flex-direction:column}
    .app.active{display:flex}
    .header{background:#1e293b;padding:0 24px;height:56px;display:flex;justify-content:space-between;align-items:center}
    .layout{display:grid;grid-template-columns:360px 1fr;flex:1}
    .sidebar{background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column}
    .stats-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #334155;text-align:center}
    .stat-box{padding:14px;border-right:1px solid #334155}
    .stat-num{font-size:22px;font-weight:700;color:#6366f1}
    .email-list{flex:1;overflow-y:auto;padding:8px}
    .email-card{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:11px 12px;margin-bottom:5px;cursor:pointer}
    .email-card.active{border-color:#6366f1;background:#1e293b}
    .ec-subject{font-size:13px;font-weight:600;margin-bottom:5px}
    .badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
    .b-open{background:#064e3b;color:#34d399}
    .b-unopen{background:#450a0a;color:#f87171}
    .main-panel{padding:20px;overflow-y:auto}
    .thread-node{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:18px;margin-bottom:10px}
    .node-subject{font-size:18px;font-weight:700;margin-bottom:5px}
    .recip-list{font-size:12px;color:#94a3b8;margin-bottom:15px}
    .history-box{border-top:1px solid #334155;padding-top:15px}
    .h-title{font-size:11px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:10px}
    .open-row{font-size:13px;color:#cbd5e1;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .open-row:last-child{border:none}
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box"><h2>MailPulse</h2><button class="btn-google" id="btnLoginGoogle">Sign in with Google</button></div>
</div>

<div id="app" class="app">
  <div class="header">
    <div style="font-weight:bold;color:#6366f1">MailPulse</div>
    <button id="btnLogout" style="padding:6px 12px;background:#dc2626;color:white;border:none;border-radius:4px;cursor:pointer">Logout</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="statEmails">0</div><div style="font-size:10px;color:#64748b">EMAILS</div></div>
        <div class="stat-box"><div class="stat-num" id="statOpens">0</div><div style="font-size:10px;color:#64748b">TOTAL OPENS</div></div>
      </div>
      <div style="padding:10px;text-align:right"><button id="btnRefresh" style="padding:4px 8px;background:#334155;color:white;border:none;border-radius:4px;cursor:pointer">↻ Refresh</button></div>
      <div class="email-list" id="emailList"></div>
    </div>
    <div class="main-panel" id="mainPanel"></div>
  </div>
</div>

<script>
  let TOKEN = null;
  let CURRENT_EMAIL_ID = null; // This remembers which email you are looking at!
  const SERVER = 'https://email-tracker-em6b.onrender.com';

  async function checkAuth() {
    TOKEN = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('mailpulse_token');
    if (!TOKEN) return show('loginScreen');
    localStorage.setItem('mailpulse_token', TOKEN);
    window.history.replaceState({}, '', '/');
    window.postMessage({ type: 'MAILPULSE_TOKEN_SYNC', token: TOKEN }, '*');
    show('app');
    loadStats(); loadEmails();
  }

  document.getElementById('btnLoginGoogle').onclick = () => window.location.href = SERVER + '/auth/google';
  document.getElementById('btnLogout').onclick = () => { localStorage.removeItem('mailpulse_token'); window.location.reload(); };
  
  // 🚨 THE FIX: Brought back the visual animation!
  document.getElementById('btnRefresh').onclick = async function() {
    const btn = this;
    btn.textContent = '↻ Refreshing...';
    btn.style.opacity = '0.5';
    btn.disabled = true;
    
    await Promise.all([loadStats(), loadEmails()]);
    
    setTimeout(() => {
      btn.textContent = '↻ Refresh';
      btn.style.opacity = '1';
      btn.disabled = false;
    }, 400);
  };

  function show(id) {
    document.getElementById('loginScreen').style.display = id === 'loginScreen' ? 'flex' : 'none';
    if(id === 'app') document.getElementById('app').classList.add('active');
  }

  async function apiFetch(path) {
    const r = await fetch(SERVER + path, { headers: { Authorization: `Bearer ${TOKEN}` } });
    return r.json();
  }

  async function loadStats() {
    const s = await apiFetch('/api/stats');
    document.getElementById('statEmails').textContent = s.totalEmails;
    document.getElementById('statOpens').textContent = s.totalOpens;
  }

  // 🚨 THE FIX: Remembers your selected email after a refresh!
  async function loadEmails() {
    const emails = await apiFetch('/api/emails');
    document.getElementById('emailList').innerHTML = emails.map((em, i) => {
      const isActive = CURRENT_EMAIL_ID ? em._id === CURRENT_EMAIL_ID : i === 0;
      return `
      <div class="email-card ${isActive ? 'active' : ''}" onclick="selectCard(this,'${em._id}')">
        <div class="ec-subject">${em.subject || '(No Subject)'}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="badge ${em.unopened ? 'b-unopen' : 'b-open'}">${em.unopened ? '✗ Unopened' : '✓ ' + em.openCount + ' Opens'}</span>
          <span style="font-size:10px;color:#64748b">${new Date(em.sentAt).toLocaleDateString()}</span>
        </div>
      </div>`;
    }).join('') || '<div style="text-align:center;color:#64748b;padding:20px">No emails tracked yet.</div>';
    
    if(emails.length) {
      const idToLoad = CURRENT_EMAIL_ID && emails.some(e => e._id === CURRENT_EMAIL_ID) ? CURRENT_EMAIL_ID : emails[0]._id;
      if (!CURRENT_EMAIL_ID) CURRENT_EMAIL_ID = idToLoad;
      loadThread(idToLoad);
    }
  }

  function selectCard(el, id) {
    CURRENT_EMAIL_ID = id;
    document.querySelectorAll('.email-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    loadThread(id);
  }

  async function loadThread(id) {
    const data = await apiFetch(`/api/emails/${id}/thread`);
    const t = data.thread;
    const recips = t.recipients.map(r => r.email).join(', ');
    
    let historyHtml = '<div style="color:#f87171;font-size:13px;padding:10px 0">✗ This email has not been opened yet.</div>';
    if (t.totalOpens > 0) {
      historyHtml = t.opens.map(o => `
        <div class="open-row">
          <span style="color:#34d399;font-weight:bold;margin-right:10px">✓ Opened</span>
          ${new Date(o.time).toLocaleString()} <span style="color:#64748b;font-size:11px;margin-left:10px">(${o.browser || 'Unknown Browser'} on ${o.os || 'Unknown Device'})</span>
        </div>
      `).join('');
    }

    document.getElementById('mainPanel').innerHTML = `
      <div class="thread-node">
        <div class="node-subject">${t.subject || '(No Subject)'}</div>
        <div class="recip-list"><strong>Sent to:</strong> ${recips}</div>
        <div class="history-box">
          <div class="h-title">Tracking History (${t.totalOpens} Total)</div>
          ${historyHtml}
        </div>
      </div>
    `;
  }
  checkAuth();
</script>
</body>
</html>
